<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickTools Pro</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body{
font-family:Poppins, sans-serif;
margin:0;
color:#fff;
text-align:center;
background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
url('https://images.unsplash.com/photo-1518770660439-4636190af475');
background-size:cover;
}

h1{margin:20px;font-size:2.8rem;animation:fade 1s}

nav button{
margin:6px;
padding:12px 20px;
border:none;
border-radius:25px;
background:rgba(255,255,255,0.15);
color:#fff;
cursor:pointer;
transition:0.3s;
}

nav button:hover{
background:#fff;
color:#000;
transform:scale(1.1);
}

.section{
display:none;
background:#fff;
color:#000;
margin:20px auto;
padding:25px;
border-radius:20px;
max-width:650px;
box-shadow:0 15px 40px rgba(0,0,0,0.4);
animation:fade 0.5s;
}

.active{display:block}

input,textarea{
width:90%;
padding:12px;
margin:10px;
border-radius:10px;
border:1px solid #ccc;
}

.btn{
background:linear-gradient(135deg,#667eea,#764ba2);
color:#fff;
padding:12px 20px;
border:none;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1}
}
</style>
</head>

<body>

<h1>🚀 QuickTools Pro</h1>

<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('word')">Word</button>
<button onclick="show('pass')">Password</button>
<button onclick="show('qr')">QR</button>
<button onclick="show('case')">Case</button>
<button onclick="show('age')">Age</button>
<button onclick="show('bmi')">BMI</button>
</nav>

<div id="home" class="section active">
<h2>All-in-One Free Tools</h2>
<p>⚡ Fast • Free • No Login Required</p>
<img src="https://cdn-icons-png.flaticon.com/512/2721/2721299.png" width="120">
</div>

<div id="word" class="section">
<textarea id="text" oninput="count()"></textarea>
<p id="result"></p>
</div>

<div id="pass" class="section">
<input type="number" id="len" value="12">
<button class="btn" onclick="gen()">Generate</button>
<p id="p"></p>
</div>

<div id="qr" class="section">
<input id="qrText">
<button class="btn" onclick="makeQR()">Generate</button>
<canvas id="canvas"></canvas>
</div>

<div id="case" class="section">
<textarea id="caseText"></textarea>
<button onclick="upper()">UPPER</button>
<button onclick="lower()">lower</button>
</div>

<div id="age" class="section">
<input type="date" id="dob">
<button onclick="age()">Calc</button>
<p id="ageOut"></p>
</div>

<div id="bmi" class="section">
<input id="h" placeholder="Height cm">
<input id="w" placeholder="Weight kg">
<button onclick="bmi()">Calc</button>
<p id="b"></p>
</div>

<script>
function show(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function count(){
let t=document.getElementById('text').value;
document.getElementById('result').innerText=
"Words: "+(t.trim()?t.trim().split(/\s+/).length:0);
}

function gen(){
let l=document.getElementById('len').value;
let c="abcABC123!@#";
let p="";
for(let i=0;i<l;i++)p+=c[Math.floor(Math.random()*c.length)];
document.getElementById('p').innerText=p;
}

function makeQR(){
QRCode.toCanvas(document.getElementById('canvas'),document.getElementById('qrText').value);
}

function upper(){
let t=document.getElementById('caseText');
t.value=t.value.toUpperCase();
}
function lower(){
let t=document.getElementById('caseText');
t.value=t.value.toLowerCase();
}

function age(){
let d=new Date(document.getElementById('dob').value);
let a=new Date().getFullYear()-d.getFullYear();
document.getElementById('ageOut').innerText=a+" years";
}

function bmi(){
let h=document.getElementById('h').value/100;
let w=document.getElementById('w').value;
let res=w/(h*h);
document.getElementById('b').innerText="BMI: "+res.toFixed(2);
}
</script>

</body>
</html>
